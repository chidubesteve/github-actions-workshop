name: "Read Secret"
on:
  workflow_dispatch:
    inputs:
      secret_name:
        description: "Name of the secret to read"
        required: true
        default: "MY_SECRET"

jobs:
  read_secret:
    runs-on: ubuntu-latest
    steps:
      - name: "Read and display the secret"
        shell: bash
        run: |
          echo "The value of the secret is: ${{ secrets[github.event.inputs.secret_name] }}"
